name: auto-assign

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    uses: ArthemizLabs/.github/.github/workflows/auto-assign.yml@<SHA>
    with:
      workdir: "."
      node-version: "20"
      python-version: "3.12"
      go-version: "1.22"
    secrets: inherit
