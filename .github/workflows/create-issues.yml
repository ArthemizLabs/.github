name: Create Issues

on:
  workflow_dispatch:
    inputs:
      epic_selection:
        description: 'Select which epic to create issues for'
        required: true
        type: choice
        options:
          - 'all'
          - 'TECH_STACK'
          - 'PORTFOLIO'
          - 'LANG_EN'
          - 'LANG_JP'
          - 'CERTIFICATIONS'
        default: 'all'
      dry_run:
        description: 'Dry run (print issues without creating them)'
        required: false
        type: boolean
        default: false

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create issues parser script
        run: |
          cat > create_issues.py << 'PYTHON_SCRIPT'
