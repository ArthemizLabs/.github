                  {"id": "PRJ-05.2", "title": "Comunicação Socket", "description": "Enviar dados via TCP para OpsLedger.", "phase": "PHASE_2028", "project": "Sentinel Agent"},
                  {"id": "PRJ-05.3", "title": "Serialização", "description": "Implementar JSON leve ou protocolo binário próprio.", "phase": "PHASE_2028", "project": "Sentinel Agent"},
                  {"id": "PRJ-05.4", "title": "Threads & Concorrência", "description": "Coleta paralela de métricas com pthreads.", "phase": "PHASE_2029", "project": "Sentinel Agent"},
                  {"id": "PRJ-05.5", "title": "Hardening & Performance", "description": "Otimização de memória + testes de carga + criptografia TLS.", "phase": "PHASE_2029", "project": "Sentinel Agent"},
              ],
              "PORTFOLIO_OpenSource": [
                  {"id": "PRJ-06.1", "title": "Hunting", "description": "Identificar 3 projetos (ex: NestJS, Spring Security ou Terraform Providers) com a tag good-first-issue ou help-wanted. Resolver Issues Simples.", "phase": "PHASE_2026", "project": "Open Source"},
                  {"id": "PRJ-06.2", "title": "Reprodução", "description": "Clonar, configurar (Docker) e reproduzir o bug na issue.", "phase": "PHASE_2027", "project": "Open Source"},
                  {"id": "PRJ-06.3", "title": "Code", "description": "Submeter um Pull Request que resolva um bug ou melhore a documentação técnica.", "phase": "PHASE_2028", "project": "Open Source"},
                  {"id": "PRJ-06.4", "title": "Community", "description": "Participar de discussões em Issues ou no Discord oficial do projeto.", "phase": "PHASE_2028", "project": "Open Source"},
                  {"id": "PRJ-06.5", "title": "Manutenção", "description": "Participar de módulos relevantes.", "phase": "PHASE_2029", "project": "Open Source"},
              ],
              "LANG_EN": [
                  {"id": "EN-01", "title": "Grammar Core", "description": "Focar em Cambridge Grammar in Use para base.", "phase": "PHASE_2026"},
                  {"id": "EN-02", "title": "Writing Task", "description": "Criar textos/redações.", "phase": "PHASE_2026"},
                  {"id": "EN-03", "title": "Listening/Reading", "description": "Shadowing technique com podcasts como Syntax.fm para pegar gírias de dev. Ler 1 livro técnico (ex: Clean Code) em inglês por semestre.", "phase": "PHASE_2026"},
                  {"id": "EN-04", "title": "Simulados", "description": "Realizar testes de nível.", "phase": "PHASE_2027"},
                  {"id": "EN-05", "title": "Writing Task 2", "description": "Criar documentações técnicas específicas.", "phase": "PHASE_2027"},
                  {"id": "EN-06", "title": "Diagnóstico IELTS", "description": "Aumentar nível.", "phase": "PHASE_2027"},
                  {"id": "EN-07", "title": "Speaking B2", "description": "Ter fluência da fala.", "phase": "PHASE_2027"},
                  {"id": "EN-08", "title": "Certificação IELTS (Treino)", "description": "Simulados focados nas bandas 7.5+.", "phase": "PHASE_2028"},
                  {"id": "EN-09", "title": "Conversação C1/C2", "description": "Aulas de conversação ou prática semanal focada em explicar códigos em inglês.", "phase": "PHASE_2028"},
                  {"id": "EN-10", "title": "IELTS Oficial", "description": "Realizar a prova.", "phase": "PHASE_2029"},
              ],
              "LANG_JP": [
                  {"id": "JP-01", "title": "Hiragana/Katakana", "description": "Memorização completa dos alfabetos fonéticos.", "phase": "PHASE_2026"},
                  {"id": "JP-02", "title": "Listening", "description": "Método AJATT (All Japanese All The Time) para acostumar o ouvido aos fonemas.", "phase": "PHASE_2026"},
                  {"id": "JP-03", "title": "Kanji Core", "description": "Memorização de 500 kanjis via Anki.", "phase": "PHASE_2026"},
                  {"id": "JP-04", "title": "Genki I", "description": "Gramática básica e vocabulário de sobrevivência.", "phase": "PHASE_2027"},
                  {"id": "JP-05", "title": "Genki II", "description": "Gramática avançada e vocabulário técnico.", "phase": "PHASE_2027"},
                  {"id": "JP-06", "title": "Reading", "description": "Acostumar com a leitura técnica.", "phase": "PHASE_2027"},
                  {"id": "JP-07", "title": "Simulados JLPT", "description": "Realizar testes de nível.", "phase": "PHASE_2027"},
                  {"id": "JP-08", "title": "JLPT N4 (Básico Sólido)", "description": "Conjugações verbais e partículas complexas. Meta: passar na prova oficial.", "phase": "PHASE_2027"},
                  {"id": "JP-09", "title": "Grammar N3", "description": "Domínio gramatical completo.", "phase": "PHASE_2028"},
                  {"id": "JP-10", "title": "JLPT N3 (Intermediário)", "description": "Leitura de textos técnicos simples e conversação do dia a dia.", "phase": "PHASE_2028-29"},
                  {"id": "JP-11", "title": "JLPT Oficial", "description": "Realizar a prova.", "phase": "PHASE_2028"},
              ],
          }

          def get_epic_label(epic: str) -> str:
              """Get the epic label."""
              epic_map = {
                  "TECH_STACK": "epic:tech-stack",
                  "PORTFOLIO_Arthemiz": "epic:portfolio",
                  "PORTFOLIO_OpsLedger": "epic:portfolio",
                  "PORTFOLIO_Vendas3D": "epic:portfolio",
                  "PORTFOLIO_SystemHealth": "epic:portfolio",
                  "PORTFOLIO_Sentinel": "epic:portfolio",
                  "PORTFOLIO_OpenSource": "epic:portfolio",
                  "LANG_EN": "epic:lang-en",
                  "LANG_JP": "epic:lang-jp",
              }
              return epic_map.get(epic, "epic:other")

          def get_phase_label(phase: str) -> str:
              """Get the phase label."""
              return phase.lower().replace("_", "-")

          def get_project_label(project: Optional[str]) -> Optional[str]:
              """Get the project label."""
              if not project:
                  return None
              return f"project:{project.lower().replace(' ', '-')}"

          def create_issue(task: Dict, epic: str, dry_run: bool = False) -> None:
              """Create a GitHub issue from a task."""
              task_id = task["id"]
              title = f"[{task_id}] {task['title']}"

              # Build description
              description = f"**ID:** {task_id}\\n"
              description += f"**Fase:** {task['phase']}\\n"
              if 'project' in task:
                  description += f"**Projeto:** {task['project']}\\n"
              description += f"\\n{task['description']}"

              # Build labels
              labels = [get_epic_label(epic), get_phase_label(task['phase'])]
              if 'project' in task:
                  project_label = get_project_label(task['project'])
                  if project_label:
                      labels.append(project_label)

              labels_str = ",".join(labels)

              if dry_run:
                  print(f"[DRY RUN] Would create issue:")
                  print(f"  Title: {title}")
                  print(f"  Labels: {labels_str}")
                  print(f"  Description: {description[:100]}...")
                  print()
              else:
                  # Create the issue using gh CLI
                  cmd = [
                      "gh", "issue", "create",
                      "--title", title,
                      "--body", description,
                      "--label", labels_str
                  ]

                  try:
                      result = subprocess.run(cmd, capture_output=True, text=True, check=True)
                      print(f"✅ Created issue: {title}")
                      print(f"   URL: {result.stdout.strip()}")
                  except subprocess.CalledProcessError as e:
                      print(f"❌ Failed to create issue: {title}")
                      print(f"   Error: {e.stderr}")

          def main():
              epic_selection = os.environ.get("EPIC_SELECTION", "all")
              dry_run = os.environ.get("DRY_RUN", "false").lower() == "true"

              print(f"Epic selection: {epic_selection}")
              print(f"Dry run: {dry_run}")
              print()

              epics_to_process = []

              if epic_selection == "all":
                  epics_to_process = list(TASKS.keys())
              elif epic_selection == "PORTFOLIO":
                  epics_to_process = [k for k in TASKS.keys() if k.startswith("PORTFOLIO_")]
              else:
                  # Find matching epic
                  for key in TASKS.keys():
                      if key == epic_selection or key.startswith(f"{epic_selection}_"):
                          epics_to_process.append(key)

              if not epics_to_process:
                  print(f"❌ No epics found for selection: {epic_selection}")
                  sys.exit(1)

              print(f"Processing epics: {epics_to_process}")
              print()

              total_issues = 0
              for epic in epics_to_process:
                  tasks = TASKS[epic]
                  print(f"Processing {epic}: {len(tasks)} tasks")
                  for task in tasks:
                      create_issue(task, epic, dry_run)
                      total_issues += 1

              print()
              print(f"{'[DRY RUN] Would create' if dry_run else 'Created'} {total_issues} issues")

          if __name__ == "__main__":
              main()
          PYTHON_SCRIPT

          chmod +x create_issues.py

      - name: Create issues
        env:
          GH_TOKEN: ${{ github.token }}
          EPIC_SELECTION: ${{ github.event.inputs.epic_selection }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          python3 create_issues.py

      - name: Summary
        if: always()
        run: |
          echo "## GitHub Issues Creation Complete! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "**Dry run mode:** No issues were actually created." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Run the workflow again with 'dry_run' set to 'false' to create the issues." >> $GITHUB_STEP_SUMMARY
          else
            echo "Issues have been created from the PROJECT_DOCUMENTATION.md file." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
            echo "1. Navigate to the Issues tab to view all created issues" >> $GITHUB_STEP_SUMMARY
            echo "2. Add issues to the appropriate GitHub Projects" >> $GITHUB_STEP_SUMMARY
            echo "3. Configure the custom fields for each issue in the Projects" >> $GITHUB_STEP_SUMMARY
          fi
