                  {"id": "PRJ-04.4", "title": "Deploy Cloud (IaaS)", "description": "Subir o projeto em uma VPS (EC2/DigitalOcean) configurando Nginx e firewall Linux manualmente.", "phase": "PHASE_2027", "project": "SystemHealth"},
                  {"id": "PRJ-04.5", "title": "Hardening de Segurança", "description": "Implementar OAuth2/OIDC, Rate Limiting, rotação de logs e auditoria.", "phase": "PHASE_2028", "project": "SystemHealth"},
                  {"id": "PRJ-04.6", "title": "Refatoração Microserviços", "description": "Separar o serviço de Auth e o de Ingestão do monólito principal.", "phase": "PHASE_2028", "project": "SystemHealth"},
              ],
              "PORTFOLIO_Sentinel": [
                  {"id": "PRJ-05.1", "title": "Coleta Local", "description": "Coletar CPU, memória e disco via chamadas POSIX/Linux.", "phase": "PHASE_2027", "project": "Sentinel Agent"},
