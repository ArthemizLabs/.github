name: Create Issues

on:
  workflow_dispatch:
    inputs:
      epic_selection:
        description: 'Select which epic to create issues for'
        required: true
        type: choice
        options:
          - 'all'
          - 'TECH_STACK'
          - 'PORTFOLIO'
          - 'LANG_EN'
          - 'LANG_JP'
          - 'CERTIFICATIONS'
        default: 'all'
      dry_run:
        description: 'Dry run (print issues without creating them)'
        required: false
        type: boolean
        default: false

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Restringir execução a um usuário autorizado
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_ACTOR}" != "A4thu4" ]; then
            echo "ERRO: este workflow só pode ser executado pelo OWNER da ORGANIZATION. Ator atual: ${GITHUB_ACTOR}"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bootstrap labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Ensure all required labels exist before creating issues
          # This prevents errors when applying labels to issues

          # Epic labels
          gh label create "epic:tech-stack" --color "0052CC" --description "Technical stack evolution tasks" --force
          gh label create "epic:portfolio" --color "00875A" --description "Portfolio project tasks" --force
          gh label create "epic:lang-en" --color "FFAB00" --description "English language tasks" --force
          gh label create "epic:lang-jp" --color "FF5630" --description "Japanese language tasks" --force
          gh label create "epic:certifications" --color "6554C0" --description "Certification-related tasks" --force

          # Phase labels
          gh label create "phase-2026" --color "B3D4FF" --description "Foundation phase" --force
          gh label create "phase-2027" --color "0052CC" --description "Expansion phase" --force
          gh label create "phase-2028" --color "00875A" --description "Quality & Security phase" --force
          gh label create "phase-2029" --color "FFAB00" --description "Mastery phase" --force

          # Project labels
          gh label create "project:arthemiz" --color "0052CC" --force
          gh label create "project:opsledger" --color "00875A" --force
          gh label create "project:vendas3d" --color "FFAB00" --force
          gh label create "project:systemhealth" --color "FF5630" --force
          gh label create "project:sentinel-agent" --color "6554C0" --force
          gh label create "project:open-source" --color "172B4D" --force

          echo "All labels bootstrapped successfully"

      - name: Create issues parser script
        run: |
          cat > create_issues.py << 'PYTHON_SCRIPT'
          #!/usr/bin/env python3
          import os
          import sys
          import json
          import subprocess
          from typing import List, Dict, Optional

          # Task definitions aligned with PROJECT_DOCUMENTATION.md
          TASKS = {
              "TECH_STACK": [
                  {"id": "TS-01", "title": "Dominar Linguagem Tipada", "description": "Aprofundar em Java (Spring) ou C# (.NET) ou TypeScript (NestJS) com foco em OOP e Design Patterns.", "phase": "PHASE_2026"},
                  {"id": "TS-02", "title": "SQL Avançado", "description": "Stored Procedures, Triggers, Indexing Strategy e Query Optimization.", "phase": "PHASE_2026"},
                  {"id": "TS-03", "title": "API Design Patterns", "description": "Implementar padrões RESTful estritos, HATEOAS e conceitos de Idempotência.", "phase": "PHASE_2026"},
                  {"id": "TS-04", "title": "Docker & Containerization", "description": "Criar Dockerfiles multi-stage otimizados e docker-compose para ambiente dev.", "phase": "PHASE_2027"},
                  {"id": "TS-05", "title": "Cloud Associate (AWS/Azure)", "description": "Estudo para certificação de arquiteto associado (foco em Compute, Storage, Network).", "phase": "PHASE_2027"},
                  {"id": "TS-06", "title": "Pipeline ETL com Python", "description": "Scripting em Python (Pandas/Polars) para processar logs brutos e salvar em banco analítico.", "phase": "PHASE_2028"},
                  {"id": "TS-07", "title": "AppSec & OWASP Top 10", "description": "Implementar correções para XSS, Injection, Broken Auth no projeto principal.", "phase": "PHASE_2028"},
                  {"id": "TS-08", "title": "CI/CD Pipelines", "description": "Configurar GitHub Actions para testes automáticos, linting e deploy em staging.", "phase": "PHASE_2028"},
                  {"id": "TS-09", "title": "System Design", "description": "Estudar Caching (Redis), Load Balancers, Sharding e Teorema CAP.", "phase": "PHASE_2029"},
              ],
          }

          def get_epic_label(epic: str) -> str:
              epic_map = {
                  "TECH_STACK": "epic:tech-stack",
                  "PORTFOLIO_Arthemiz": "epic:portfolio",
                  "PORTFOLIO_OpsLedger": "epic:portfolio",
                  "PORTFOLIO_Vendas3D": "epic:portfolio",
                  "PORTFOLIO_SystemHealth": "epic:portfolio",
                  "PORTFOLIO_Sentinel": "epic:portfolio",
                  "PORTFOLIO_OpenSource": "epic:portfolio",
                  "LANG_EN": "epic:lang-en",
                  "LANG_JP": "epic:lang-jp",
                  "CERTIFICATIONS": "epic:certifications",
              }
              return epic_map.get(epic, "epic:other")

          def get_phase_label(phase: str) -> str:
              return phase.lower().replace("_", "-")

          def issue_exists(title: str) -> bool:
              cmd = [
                  "gh", "issue", "list",
                  "--search", f'"{title}" in:title',
                  "--state", "all",
                  "--json", "title",
                  "--limit", "100",
              ]
              try:
                  result = subprocess.run(cmd, capture_output=True, text=True, check=True)
                  issues = json.loads(result.stdout)
                  return any(i["title"] == title for i in issues)
              except (subprocess.CalledProcessError, json.JSONDecodeError):
                  return False

          def create_issue(task: Dict, epic: str, dry_run: bool = False) -> None:
              task_id = task["id"]
              title = f"[{task_id}] {task['title']}"

              description = f"**ID:** {task_id}\n"
              description += f"**Fase:** {task['phase']}\n"
              description += f"\n{task['description']}"

              labels = [get_epic_label(epic), get_phase_label(task['phase'])]
              labels_str = ",".join(labels)

              if dry_run:
                  print(f"[DRY RUN] Would create issue:")
                  print(f"  Title: {title}")
                  print(f"  Labels: {labels_str}")
                  print()
                  return

              if issue_exists(title):
                  print(f"Skipped (already exists): {title}")
                  return

              cmd = [
                  "gh", "issue", "create",
                  "--title", title,
                  "--body", description,
                  "--label", labels_str
              ]

              try:
                  result = subprocess.run(cmd, capture_output=True, text=True, check=True)
                  print(f"Created issue: {title}")
                  print(f"URL: {result.stdout.strip()}")
              except subprocess.CalledProcessError as e:
                  print(f"Failed to create issue: {title}")
                  print(f"Error: {e.stderr}")

          def main():
              epic_selection = os.environ.get("EPIC_SELECTION", "all")
              dry_run = os.environ.get("DRY_RUN", "false").lower() == "true"

              epics_to_process = []
              if epic_selection == "all":
                  epics_to_process = list(TASKS.keys())
              else:
                  for key in TASKS.keys():
                      if key == epic_selection or key.startswith(f"{epic_selection}_"):
                          epics_to_process.append(key)

              if not epics_to_process:
                  print(f"No epics found for selection: {epic_selection}")
                  sys.exit(1)

              total_tasks = 0
              for epic in epics_to_process:
                  for task in TASKS[epic]:
                      create_issue(task, epic, dry_run)
                      total_tasks += 1

              print(f"{'[DRY RUN] Would process' if dry_run else 'Processed'} {total_tasks} tasks")

          if __name__ == "__main__":
              main()
          PYTHON_SCRIPT

          chmod +x create_issues.py

      - name: Create issues
        env:
          GH_TOKEN: ${{ github.token }}
          EPIC_SELECTION: ${{ github.event.inputs.epic_selection }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          python3 create_issues.py

      - name: Summary
        if: always()
        run: |
          echo "## GitHub Issues Creation Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "**Dry run mode:** No issues were actually created." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Run the workflow again with 'dry_run' set to 'false' to create the issues." >> $GITHUB_STEP_SUMMARY
          else
            echo "Issues have been created from the predefined task list." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
            echo "1. Navigate to the Issues tab to view all created issues" >> $GITHUB_STEP_SUMMARY
            echo "2. Add issues to the appropriate GitHub Projects" >> $GITHUB_STEP_SUMMARY
            echo "3. Configure the custom fields for each issue in the Projects" >> $GITHUB_STEP_SUMMARY
          fi
