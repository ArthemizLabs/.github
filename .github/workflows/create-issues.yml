name: Create Issues

on:
  workflow_dispatch:
    inputs:
      epic_selection:
        description: 'Select which epic to create issues for'
        required: true
        type: choice
        options:
          - 'all'
          - 'TECH_STACK'
          - 'PORTFOLIO'
          - 'LANG_EN'
          - 'LANG_JP'
          - 'CERTIFICATIONS'
        default: 'all'
      dry_run:
        description: 'Dry run (print issues without creating them)'
        required: false
        type: boolean
        default: false

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Restringir execução a um usuário autorizado
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_ACTOR}" != "${GITHUB_REPOSITORY_OWNER}" ]; then
            echo "ERRO: este workflow só pode ser executado pelo OWNER da ORGANIZATION/REPOSITORY (${GITHUB_REPOSITORY_OWNER}). Ator atual: ${GITHUB_ACTOR}"
            exit 1
          fi
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bootstrap labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Ensure all required labels exist before creating issues
          # This prevents errors when applying labels to issues

          # Epic labels
          gh label create "epic:tech-stack" --color "0052CC" --description "Technical stack evolution tasks" --force
          gh label create "epic:portfolio" --color "00875A" --description "Portfolio project tasks" --force
          gh label create "epic:lang-en" --color "FFAB00" --description "English language tasks" --force
          gh label create "epic:lang-jp" --color "FF5630" --description "Japanese language tasks" --force
          gh label create "epic:certifications" --color "6554C0" --description "Certification-related tasks" --force

          # Phase labels
          gh label create "phase-2026" --color "B3D4FF" --description "Foundation phase" --force
          gh label create "phase-2027" --color "0052CC" --description "Expansion phase" --force
          gh label create "phase-2028" --color "00875A" --description "Quality & Security phase" --force
          gh label create "phase-2029" --color "FFAB00" --description "Mastery phase" --force

          # Project labels
          gh label create "project:arthemiz" --color "0052CC" --force
          gh label create "project:opsledger" --color "00875A" --force
          gh label create "project:vendas3d" --color "FFAB00" --force
          gh label create "project:systemhealth" --color "FF5630" --force
          gh label create "project:sentinel-agent" --color "6554C0" --force
          gh label create "project:open-source" --color "172B4D" --force

          echo "All labels bootstrapped successfully"

      - name: Create issues parser script
        run: |
          cat > create_issues.py << 'PYTHON_SCRIPT'
          #!/usr/bin/env python3
          import os
          import sys
          import json
          import subprocess
          from typing import List, Dict, Optional

          # Task definitions aligned with PROJECT_DOCUMENTATION.md
          TASKS = {
              "TECH_STACK": [
                  {"id": "TS-01", "title": "Dominar Linguagem Tipada", "description": "Aprofundar em Java (Spring) ou C# (.NET) ou TypeScript (NestJS) com foco em OOP e Design Patterns.", "phase": "PHASE_2026"},
                  {"id": "TS-02", "title": "SQL Avançado", "description": "Stored Procedures, Triggers, Indexing Strategy e Query Optimization.", "phase": "PHASE_2026"},
                  {"id": "TS-03", "title": "API Design Patterns", "description": "Implementar padrões RESTful estritos, HATEOAS e conceitos de Idempotência.", "phase": "PHASE_2026"},
                  {"id": "TS-04", "title": "Docker & Containerization", "description": "Criar Dockerfiles multi-stage otimizados e docker-compose para ambiente dev.", "phase": "PHASE_2027"},
                  {"id": "TS-05", "title": "Cloud Associate (AWS/Azure)", "description": "Estudo para certificação de arquiteto associado (foco em Compute, Storage, Network).", "phase": "PHASE_2027"},
                  {"id": "TS-06", "title": "Pipeline ETL com Python", "description": "Scripting em Python (Pandas/Polars) para processar logs brutos e salvar em banco analítico.", "phase": "PHASE_2027"},
                  {"id": "TS-07", "title": "AppSec & OWASP Top 10", "description": "Implementar correções para XSS, Injection, Broken Auth no projeto principal.", "phase": "PHASE_2028"},
                  {"id": "TS-08", "title": "CI/CD Pipelines", "description": "Configurar GitHub Actions para testes automáticos, linting e deploy em staging.", "phase": "PHASE_2028"},
                  {"id": "TS-09", "title": "System Design", "description": "Estudar Caching (Redis), Load Balancers, Sharding e Teorema CAP.", "phase": "PHASE_2029"},
              ],
              "PORTFOLIO_Arthemiz": [
                  {"id": "PRJ-01.1", "title": "MVP Domínios", "description": "Usar CLI em Go para consultar registros (A, CNAME, MX) via Cloudflare API.", "phase": "PHASE_2026", "project": "Arthemiz"},
                  {"id": "PRJ-01.2", "title": "Proxy Reverse", "description": "Implementar Proxy reverse para logging estruturado.", "phase": "PHASE_2026", "project": "Arthemiz"},
                  {"id": "PRJ-01.3", "title": "Autenticação", "description": "Auth básica + permissões iniciais.", "phase": "PHASE_2026", "project": "Arthemiz"},
