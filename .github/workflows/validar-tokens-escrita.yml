name: validar-tokens-escrita

on:
  workflow_call:
    inputs:
      issue_url:
        description: "URL do issue/PR (ex.: https://github.com/ArthemizLabs/.github/issues/91)"
        required: true
        default: "https://github.com/ArthemizLabs/.github/issues/91"
        type: string
      trimestre:
        description: "Valor do Sprint/Trimestre (ex.: 2026-Q3)"
        required: true
        default: "2026-Q3"
        type: string
      organization:
        description: "Organização onde o Project v2 está configurado."
        required: false
        default: "ArthemizLabs"
        type: string
      project_languages:
        description: "Número do Project v2 (Languages)."
        required: false
        default: "30"
        type: string
      project_master:
        description: "Número do Project v2 (Master)."
        required: false
        default: "16"
        type: string
      project_roadmap:
        description: "Número do Project v2 (Roadmap)."
        required: false
        default: "23"
        type: string
      field_start:
        description: "Nome do campo de data inicial."
        required: false
        default: "Start"
        type: string
      field_end:
        description: "Nome do campo de data final."
        required: false
        default: "End"
        type: string
      field_trimestre:
        description: "Nome do campo de Sprint/Trimestre."
        required: false
        default: "Sprint/Trimestre"
        type: string
    secrets:
      projects_token:
        description: "Token com acesso aos Projects v2."
        required: true

permissions:
  contents: read

jobs:
  testar_sincronizacao:
    runs-on: ubuntu-latest
    env:
      ORGANIZATION: ${{ inputs.organization }}
      PROJECT_LANGUAGES: ${{ inputs.project_languages }}
      PROJECT_MASTER: ${{ inputs.project_master }}
      PROJECT_ROADMAP: ${{ inputs.project_roadmap }}
      FIELD_START: ${{ inputs.field_start }}
      FIELD_END: ${{ inputs.field_end }}
      FIELD_TRIMESTRE: ${{ inputs.field_trimestre }}
    steps:
      - name: Validar secret PROJECTS_TOKEN
        shell: bash
        run: |
          if [ -z "${PROJECTS_TOKEN}" ]; then
            echo "Secret PROJECTS_TOKEN não está configurado."
            exit 1
          fi
          echo "Secret PROJECTS_TOKEN encontrado (valor oculto)."
        env:
          PROJECTS_TOKEN: ${{ secrets.projects_token }}

      - name: Calcular datas do trimestre
        id: datas
        shell: bash
        run: |
          set -euo pipefail
          trimestre="${{ inputs.trimestre }}"

          if ! echo "$trimestre" | grep -Eq '^[0-9]{4}-Q[1-4]$'; then
            echo "Trimestre inválido: '$trimestre'. Use o formato YYYY-Qn (ex.: 2026-Q3)."
            exit 1
          fi

          ano="${trimestre%-Q*}"
          quarter="${trimestre#*-Q}"

          case "$quarter" in
            1) start="${ano}-01-01"; end="${ano}-03-31" ;;
            2) start="${ano}-04-01"; end="${ano}-06-30" ;;
            3) start="${ano}-07-01"; end="${ano}-09-30" ;;
            4) start="${ano}-10-01"; end="${ano}-12-31" ;;
          esac

          echo "start=$start" >> "$GITHUB_OUTPUT"
          echo "end=$end" >> "$GITHUB_OUTPUT"

          echo "Trimestre: $trimestre"
          echo "Start: $start"
          echo "End:   $end"

      - name: Resolver owner/repo e número do issue a partir da URL
        id: issue
        shell: bash
        run: |
          set -euo pipefail
          url="${{ inputs.issue_url }}"

          owner_repo=$(echo "$url" | sed -E 's#https://github.com/([^/]+/[^/]+)/(issues|pull)/([0-9]+).*#\1#')
          kind=$(echo "$url" | sed -E 's#https://github.com/([^/]+/[^/]+)/(issues|pull)/([0-9]+).*#\2#')
          number=$(echo "$url" | sed -E 's#https://github.com/([^/]+/[^/]+)/(issues|pull)/([0-9]+).*#\3#')

          if [ -z "$owner_repo" ] || [ -z "$kind" ] || [ -z "$number" ]; then
            echo "URL inválida: $url"
            exit 1
          fi

          echo "owner_repo=$owner_repo" >> "$GITHUB_OUTPUT"
          echo "kind=$kind" >> "$GITHUB_OUTPUT"
          echo "number=$number" >> "$GITHUB_OUTPUT"

          echo "Item: ${owner_repo} (${kind} #${number})"

      - name: Sincronizar Sprint/Trimestre (Languages) + Start/End (3 projects)
        shell: bash
        env:
          PROJECTS_TOKEN: ${{ secrets.projects_token }}
          OWNER_REPO: ${{ steps.issue.outputs.owner_repo }}
          ITEM_KIND: ${{ steps.issue.outputs.kind }}
          ITEM_NUMBER: ${{ steps.issue.outputs.number }}
          TRIMESTRE: ${{ inputs.trimestre }}
          START_DATE: ${{ steps.datas.outputs.start }}
          END_DATE: ${{ steps.datas.outputs.end }}
        run: |
          set -euo pipefail

          graphql() {
            local payload="$1"
            curl -sS \
              -H "Authorization: Bearer ${PROJECTS_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d "$payload" \
              https://api.github.com/graphql
          }

          owner=$(echo "$OWNER_REPO" | cut -d/ -f1)
          repo=$(echo "$OWNER_REPO" | cut -d/ -f2)

          echo "Obtendo content id via GraphQL..."
          if [ "$ITEM_KIND" = "issues" ]; then
            query_content='query($owner: String!, $repo: String!, $number: Int!) { repository(owner: $owner, name: $repo) { issue(number: $number) { id } } }'
            content_path='.data.repository.issue.id'
          else
            query_content='query($owner: String!, $repo: String!, $number: Int!) { repository(owner: $owner, name: $repo) { pullRequest(number: $number) { id } } }'
            content_path='.data.repository.pullRequest.id'
          fi

          payload_content=$(jq -n \
            --arg q "$query_content" \
            --arg owner "$owner" \
            --arg repo "$repo" \
            --argjson number "$ITEM_NUMBER" \
            '{query: $q, variables: {owner: $owner, repo: $repo, number: $number}}')

          content_response=$(graphql "$payload_content")
          content_id=$(echo "$content_response" | jq -r "$content_path // empty")
          if [ -z "$content_id" ]; then
            echo "Não foi possível obter o id do item. Resposta:"
            echo "$content_response" | jq
            exit 1
          fi
          echo "Content id: $content_id"

          query_project='
          query($org: String!, $number: Int!) {
            organization(login: $org) {
              projectV2(number: $number) {
                id
                title
                fields(first: 100) {
                  nodes {
                    __typename
                    ... on ProjectV2Field { id name dataType }
                    ... on ProjectV2SingleSelectField { id name options { id name } }
                    ... on ProjectV2IterationField { id name }
                  }
                }
                items(first: 100) {
                  nodes {
                    id
                    content {
                      __typename
                      ... on Issue { id }
                      ... on PullRequest { id }
                    }
                  }
                }
              }
            }
          }'

          mutation_update_date='mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $date: Date!) {
            updateProjectV2ItemFieldValue(
              input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { date: $date } }
            ) { projectV2Item { id } }
          }'

          mutation_update_single_select='mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
            updateProjectV2ItemFieldValue(
              input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { singleSelectOptionId: $optionId } }
            ) { projectV2Item { id } }
          }'

          atualizar_project() {
            local project_number="$1"
            local atualizar_trimestre="$2" # true/false

            echo ""
            echo "---- Project #${project_number} ----"

            payload_project=$(jq -n \
              --arg q "$query_project" \
              --arg org "$ORGANIZATION" \
              --argjson number "$project_number" \
              '{query: $q, variables: {org: $org, number: $number}}')

            project_response=$(graphql "$payload_project")

            project_id=$(echo "$project_response" | jq -r '.data.organization.projectV2.id // empty')
            project_title=$(echo "$project_response" | jq -r '.data.organization.projectV2.title // empty')
            if [ -z "$project_id" ]; then
              echo "Não consegui obter project id (Project #${project_number})."
              echo "$project_response" | jq
              return 1
            fi
            echo "Project: ${project_title} (#${project_number})"

            start_field_id=$(echo "$project_response" | jq -r --arg name "$FIELD_START" '
              .data.organization.projectV2.fields.nodes[]
              | select(.name == $name)
              | .id' | head -n 1)

            end_field_id=$(echo "$project_response" | jq -r --arg name "$FIELD_END" '
              .data.organization.projectV2.fields.nodes[]
              | select(.name == $name)
              | .id' | head -n 1)

            if [ -z "$start_field_id" ] || [ -z "$end_field_id" ]; then
              echo "Não encontrei fields Start/End neste project."
              return 1
            fi

            item_id=$(echo "$project_response" | jq -r --arg contentId "$content_id" '
              .data.organization.projectV2.items.nodes[]
              | select(.content != null and .content.id == $contentId)
              | .id' | head -n 1)

            if [ -z "$item_id" ]; then
              echo "Item não está adicionado ao Project #${project_number}. Ignorando."
              return 0
            fi

            if [ "$atualizar_trimestre" = "true" ]; then
              trimestre_field_type=$(echo "$project_response" | jq -r --arg name "$FIELD_TRIMESTRE" '
                .data.organization.projectV2.fields.nodes[]
                | select(.name == $name)
                | .__typename' | head -n 1)

              if [ "$trimestre_field_type" != "ProjectV2SingleSelectField" ]; then
                echo "Field '${FIELD_TRIMESTRE}' não é Single select (tipo atual: ${trimestre_field_type:-<não encontrado>})."
                return 1
              fi

              trimestre_field_id=$(echo "$project_response" | jq -r --arg name "$FIELD_TRIMESTRE" '
                .data.organization.projectV2.fields.nodes[]
                | select(.name == $name)
                | .id' | head -n 1)

              option_id=$(echo "$project_response" | jq -r --arg name "$FIELD_TRIMESTRE" --arg optionName "$TRIMESTRE" '
                .data.organization.projectV2.fields.nodes[]
                | select(.name == $name)
                | .options[]
                | select(.name == $optionName)
                | .id' | head -n 1)

              if [ -z "$option_id" ]; then
                echo "Opção '${TRIMESTRE}' não existe no field '${FIELD_TRIMESTRE}'. Crie a opção no project e tente novamente."
                return 1
              fi

              echo "Atualizando '${FIELD_TRIMESTRE}' para ${TRIMESTRE}..."
              payload_trimestre=$(jq -n \
                --arg q "$mutation_update_single_select" \
                --arg projectId "$project_id" \
                --arg itemId "$item_id" \
                --arg fieldId "$trimestre_field_id" \
                --arg optionId "$option_id" \
                '{query: $q, variables: {projectId: $projectId, itemId: $itemId, fieldId: $fieldId, optionId: $optionId}}')

              response_trimestre=$(graphql "$payload_trimestre")
              errors_trimestre=$(echo "$response_trimestre" | jq '.errors | length // 0')
              if [ "$errors_trimestre" -gt 0 ]; then
                echo "Falha ao atualizar Sprint/Trimestre:"
                echo "$response_trimestre" | jq
                return 1
              fi
              echo "OK: Sprint/Trimestre atualizado."
            fi

            echo "Atualizando Start=${START_DATE}..."
            payload_start=$(jq -n \
              --arg q "$mutation_update_date" \
              --arg projectId "$project_id" \
              --arg itemId "$item_id" \
              --arg fieldId "$start_field_id" \
              --arg date "$START_DATE" \
              '{query: $q, variables: {projectId: $projectId, itemId: $itemId, fieldId: $fieldId, date: $date}}')

            response_start=$(graphql "$payload_start")
            errors_start=$(echo "$response_start" | jq '.errors | length // 0')
            if [ "$errors_start" -gt 0 ]; then
              echo "Falha ao atualizar Start:"
              echo "$response_start" | jq
              return 1
            fi

            echo "Atualizando End=${END_DATE}..."
            payload_end=$(jq -n \
              --arg q "$mutation_update_date" \
              --arg projectId "$project_id" \
              --arg itemId "$item_id" \
              --arg fieldId "$end_field_id" \
              --arg date "$END_DATE" \
              '{query: $q, variables: {projectId: $projectId, itemId: $itemId, fieldId: $fieldId, date: $date}}')

            response_end=$(graphql "$payload_end")
            errors_end=$(echo "$response_end" | jq '.errors | length // 0')
            if [ "$errors_end" -gt 0 ]; then
              echo "Falha ao atualizar End:"
              echo "$response_end" | jq
              return 1
            fi

            echo "OK: Start/End atualizados no Project #${project_number}."
          }

          # Project próprio (Languages): atualiza Sprint/Trimestre + Start/End
          atualizar_project "$PROJECT_LANGUAGES" "true"

          # Master/Roadmap: só Start/End
          atualizar_project "$PROJECT_MASTER" "false"
          atualizar_project "$PROJECT_ROADMAP" "false"

          echo ""
          echo "Teste concluído."
