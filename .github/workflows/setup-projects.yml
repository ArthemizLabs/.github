name: Setup Projects

on:
  workflow_dispatch:
    inputs:
      project_selection:
        description: 'Select which projects to create'
        required: true
        type: choice
        options:
          - 'all'
          - 'master-only'
          - 'products-only'
          - 'roadmap-only'
        default: 'all'

jobs:
  setup-projects:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Organization ID
        id: get-org
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
        run: |
          ORG_ID=$(gh api graphql -f query='
            query {
              organization(login: "ArthemizLabs") {
                id
              }
            }
          ' --jq '.data.organization.id')
          echo "org_id=$ORG_ID" >> $GITHUB_OUTPUT
          echo "Organization ID: $ORG_ID"

      # =====================================================
      # MASTER PROJECT
      # =====================================================

      - name: Create Master Project
        if: ${{ github.event.inputs.project_selection == 'all' || github.event.inputs.project_selection == 'master-only' }}
        id: master-project
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
        run: |
          # Try to find an existing project with the title "Master — Master"
          EXISTING_PROJECT_ID=$(gh api graphql -f query='
            query {
              organization(login: "ArthemizLabs") {
                projectsV2(first: 100) {
                  nodes {
                    id
                    title
                  }
                }
              }
            }
          ' --jq '.data.organization.projectsV2.nodes[] | select(.title == "Master — Master") | .id' | head -n 1)

          if [ -n "$EXISTING_PROJECT_ID" ]; then
            PROJECT_ID="$EXISTING_PROJECT_ID"
            echo "Reusing existing Master project with ID: $PROJECT_ID"
          else
            echo "No existing Master project found. Creating a new one."
            PROJECT_ID=$(gh api graphql -f query='
              mutation {
                createProjectV2(input: {
                  ownerId: "${{ steps.get-org.outputs.org_id }}"
                  title: "Master — Master"
                }) {
                  projectV2 {
                    id
                  }
                }
              }
            ' --jq '.data.createProjectV2.projectV2.id')
          fi
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "Master Project ID: $PROJECT_ID"

      - name: Configure Master Project Fields
        if: ${{ github.event.inputs.project_selection == 'all' || github.event.inputs.project_selection == 'master-only' }}
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          PROJECT_ID: ${{ steps.master-project.outputs.project_id }}
        run: |
          # Create ID field (text)
          gh api graphql -f query='
            mutation {
              createProjectV2Field(input: {
                projectId: "'"$PROJECT_ID"'"
                dataType: TEXT
                name: "ID"
              }) {
                projectV2Field {
                  ... on ProjectV2Field {
                    id
                    name
                  }
                }
              }
            }
          '

          # Create Épico field (single select)
          gh api graphql -f query='
            mutation {
              createProjectV2Field(input: {
                projectId: "'"$PROJECT_ID"'"
                dataType: SINGLE_SELECT
                name: "Épico"
                singleSelectOptions: [
                  {name: "TECH_STACK", color: BLUE},
                  {name: "PORTFOLIO", color: GREEN},
                  {name: "LANG_EN", color: YELLOW},
                  {name: "LANG_JP", color: PINK},
                  {name: "CERTIFICATIONS", color: PURPLE}
                ]
              }) {
                projectV2Field {
                  ... on ProjectV2SingleSelectField {
                    id
                    name
                  }
                }
              }
            }
          '

          # Create Fase field (single select)
          gh api graphql -f query='
            mutation {
              createProjectV2Field(input: {
                projectId: "'"$PROJECT_ID"'"
                dataType: SINGLE_SELECT
                name: "Fase"
                singleSelectOptions: [
                  {name: "PHASE_2026", color: GRAY},
                  {name: "PHASE_2027", color: BLUE},
                  {name: "PHASE_2028", color: GREEN},
                  {name: "PHASE_2029", color: YELLOW}
                ]
              }) {
                projectV2Field {
                  ... on ProjectV2SingleSelectField {
                    id
                    name
                  }
                }
              }
            }
          '

          # Create Projeto field (single select)
          gh api graphql -f query='
            mutation {
              createProjectV2Field(input: {
                projectId: "'"$PROJECT_ID"'"
                dataType: SINGLE_SELECT
                name: "Projeto"
                singleSelectOptions: [
                  {name: "Arthemiz", color: BLUE},
                  {name: "OpsLedger", color: GREEN},
                  {name: "Vendas3D", color: YELLOW},
                  {name: "SystemHealth", color: ORANGE},
                  {name: "Sentinel Agent", color: PINK},
                  {name: "Open Source", color: PURPLE},
                  {name: "Geral", color: GRAY}
                ]
              }) {
                projectV2Field {
                  ... on ProjectV2SingleSelectField {
                    id
                    name
                  }
                }
              }
            }
          '

          # Create Start field (date)
          gh api graphql -f query='
            mutation {
              createProjectV2Field(input: {
                projectId: "'"$PROJECT_ID"'"
                dataType: DATE
                name: "Start"
              }) {
                projectV2Field {
                  ... on ProjectV2Field {
                    id
                    name
                  }
                }
              }
            }
          '

          # Create End field (date)
          gh api graphql -f query='
            mutation {
              createProjectV2Field(input: {
                projectId: "'"$PROJECT_ID"'"
                dataType: DATE
                name: "End"
              }) {
                projectV2Field {
                  ... on ProjectV2Field {
                    id
                    name
                  }
                }
              }
            }
          '

          # Create DoD field (text)
          gh api graphql -f query='
            mutation {
              createProjectV2Field(input: {
                projectId: "'"$PROJECT_ID"'"
                dataType: TEXT
                name: "DoD"
              }) {
                projectV2Field {
                  ... on ProjectV2Field {
                    id
                    name
                  }
                }
              }
            }
          '

          # Create Obs field (text)
          gh api graphql -f query='
            mutation {
              createProjectV2Field(input: {
                projectId: "'"$PROJECT_ID"'"
                dataType: TEXT
                name: "Obs"
              }) {
                projectV2Field {
                  ... on ProjectV2Field {
                    id
                    name
                  }
                }
              }
            }
          '

          # Create Tipo field (single select)
          gh api graphql -f query='
            mutation {
              createProjectV2Field(input: {
                projectId: "'"$PROJECT_ID"'"
                dataType: SINGLE_SELECT
                name: "Tipo"
                singleSelectOptions: [
                  {name: "Study", color: BLUE},
                  {name: "Feature", color: GREEN},
                  {name: "Infra", color: GRAY},
                  {name: "Security", color: RED},
                  {name: "Certification", color: YELLOW},
                  {name: "Docs", color: PURPLE},
                  {name: "Bug", color: ORANGE}
                ]
              }) {
                projectV2Field {
                  ... on ProjectV2SingleSelectField {
                    id
                    name
                  }
                }
              }
            }
          '

          echo "Master project fields configured successfully"

      - name: Update Master Project Status Field
        if: ${{ github.event.inputs.project_selection == 'all' || github.event.inputs.project_selection == 'master-only' }}
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          PROJECT_ID: ${{ steps.master-project.outputs.project_id }}
        run: |
          # Get the Status field ID
          STATUS_FIELD=$(gh api graphql -f query='
            query {
              node(id: "'"$PROJECT_ID"'") {
                ... on ProjectV2 {
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
          ' --jq '.data.node.fields.nodes[] | select(.name == "Status") | .id')

          echo "Status Field ID: $STATUS_FIELD"

          # Add BLOCKED option to Status field if it doesn't already exist
          EXISTING_OPTION_NAMES=$(gh api graphql -f query='
            query {
              node(id: "'"$PROJECT_ID"'") {
                ... on ProjectV2 {
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        name
                        options {
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
          ' --jq '.data.node.fields.nodes[] | select(.name == "Status") | .options[].name')

          if echo "$EXISTING_OPTION_NAMES" | grep -qx "BLOCKED"; then
            echo "BLOCKED option already exists, skipping"
          else
            gh api graphql -f query='
              mutation {
                createProjectV2SingleSelectFieldOption(input: {
                  fieldId: "'"$STATUS_FIELD"'"
                  name: "BLOCKED"
                  color: RED
                  description: "Task is blocked by an external dependency"
                }) {
                  option {
                    id
                    name
                  }
                }
              }
            ' || echo "⚠️  Could not add BLOCKED option via API — add it manually in the project settings"
          fi

          echo "Status field updated"

      # =====================================================
      # PRODUCT PROJECTS (Arthemiz, OpsLedger, Vendas3D, SystemHealth, Sentinel Agent, Open Source)
      # =====================================================

      - name: Create Product Projects
        if: ${{ github.event.inputs.project_selection == 'all' || github.event.inputs.project_selection == 'products-only' }}
        id: product-projects
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
        run: |
          # Array of product project names
          PRODUCTS=("Arthemiz — Project" "OpsLedger — Project" "Vendas3D — Project" "SystemHealth — Project" "Sentinel Agent — Project" "Open Source — Project")

          declare -A PROJECT_IDS

          for PRODUCT in "${PRODUCTS[@]}"; do
            echo "Processing project: $PRODUCT"

            # Try to find an existing project with the same title
            PROJECT_ID=$(gh api graphql -f query='
              query {
                node(id: "${{ steps.get-org.outputs.org_id }}") {
                  ... on Organization {
                    projectsV2(first: 100, query: "'"$PRODUCT"'") {
                      nodes {
                        id
                        title
                      }
                    }
                  }
                }
              }
            ' --jq '.data.node.projectsV2.nodes[]? | select(.title=="'"$PRODUCT"'") | .id' | head -n 1)

            if [ -n "$PROJECT_ID" ]; then
              echo "Found existing project $PRODUCT with ID: $PROJECT_ID"
            else
              echo "Creating project: $PRODUCT"
              PROJECT_ID=$(gh api graphql -f query='
                mutation {
                  createProjectV2(input: {
                    ownerId: "${{ steps.get-org.outputs.org_id }}"
                    title: "'"$PRODUCT"'"
                  }) {
                    projectV2 {
                      id
                    }
                  }
                }
              ' --jq '.data.createProjectV2.projectV2.id')

              echo "Project $PRODUCT created with ID: $PROJECT_ID"
            fi
            # Store project ID for later use
            SAFE_NAME=$(echo "$PRODUCT" | tr ' —' '_')
            echo "${SAFE_NAME}_id=$PROJECT_ID" >> $GITHUB_OUTPUT

            # Configure product project fields
            echo "Configuring fields for $PRODUCT"

            # Create Prioridade field (single select)
            gh api graphql -f query='
              mutation {
                createProjectV2Field(input: {
                  projectId: "'"$PROJECT_ID"'"
                  dataType: SINGLE_SELECT
                  name: "Prioridade"
                  singleSelectOptions: [
                    {name: "P0", color: RED},
                    {name: "P1", color: ORANGE},
                    {name: "P2", color: YELLOW},
                    {name: "P3", color: GRAY}
                  ]
                }) {
                  projectV2Field {
                    ... on ProjectV2SingleSelectField {
                      id
                      name
                    }
                  }
                }
              }
            '

            # Create Sprint/Trimestre field (single select) with quarters from 2026-Q2 to 2029-Q4
            QUARTERS='['
            for YEAR in 2026 2027 2028 2029; do
              for Q in Q1 Q2 Q3 Q4; do
                if [ "$YEAR" -eq 2026 ] && [ "$Q" = "Q1" ]; then
                  continue
                fi
                QUARTERS+="{name: \"$YEAR-$Q\", color: BLUE},"
              done
            done
            QUARTERS="${QUARTERS%,}]"

            gh api graphql -f query='
              mutation {
                createProjectV2Field(input: {
                  projectId: "'"$PROJECT_ID"'"
                  dataType: SINGLE_SELECT
                  name: "Sprint/Trimestre"
                  singleSelectOptions: '"$QUARTERS"'
                }) {
                  projectV2Field {
                    ... on ProjectV2SingleSelectField {
                      id
                      name
                    }
                  }
                }
              }
            '

            # Create Start field (date)
            gh api graphql -f query='
              mutation {
                createProjectV2Field(input: {
                  projectId: "'"$PROJECT_ID"'"
                  dataType: DATE
                  name: "Start"
                }) {
                  projectV2Field {
                    ... on ProjectV2Field {
                      id
                      name
                    }
                  }
                }
              }
            '

            # Create End field (date)
            gh api graphql -f query='
              mutation {
                createProjectV2Field(input: {
                  projectId: "'"$PROJECT_ID"'"
                  dataType: DATE
                  name: "End"
                }) {
                  projectV2Field {
                    ... on ProjectV2Field {
                      id
                      name
                    }
                  }
                }
              }
            '

            echo "Fields configured for $PRODUCT"
          done

          echo "All product projects created and configured"

      # =====================================================
      # ROADMAP PROJECT
      # =====================================================

      - name: Create Roadmap Project
        if: ${{ github.event.inputs.project_selection == 'all' || github.event.inputs.project_selection == 'roadmap-only' }}
        id: roadmap-project
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
        run: |
          # Try to find an existing project with the same title first
          PROJECT_ID=$(gh api graphql -f query='
            query($ownerId: ID!, $title: String!) {
              node(id: $ownerId) {
                ... on Organization {
                  projectsV2(first: 20, query: $title) {
                    nodes {
                      id
                      title
                    }
                  }
                }
                ... on User {
                  projectsV2(first: 20, query: $title) {
                    nodes {
                      id
                      title
                    }
                  }
                }
              }
            }
          ' -f ownerId="${{ steps.get-org.outputs.org_id }}" -f title="Roadmap — Roadmap" --jq '.data.node.projectsV2.nodes[] | select(.title=="Roadmap — Roadmap") | .id' 2>/dev/null || true)

          # If no existing project was found, create a new one
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID=$(gh api graphql -f query='
              mutation {
                createProjectV2(input: {
                  ownerId: "${{ steps.get-org.outputs.org_id }}"
                  title: "Roadmap — Roadmap"
                }) {
                  projectV2 {
                    id
                  }
                }
              }
            ' --jq '.data.createProjectV2.projectV2.id')
            echo "Created new Roadmap project."
          else
            echo "Reusing existing Roadmap project."
          fi
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "Roadmap Project ID: $PROJECT_ID"

      - name: Configure Roadmap Project Fields
        if: ${{ github.event.inputs.project_selection == 'all' || github.event.inputs.project_selection == 'roadmap-only' }}
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          PROJECT_ID: ${{ steps.roadmap-project.outputs.project_id }}
        run: |
          # Create Fase field (single select)
          gh api graphql -f query='
            mutation {
              createProjectV2Field(input: {
                projectId: "'"$PROJECT_ID"'"
                dataType: SINGLE_SELECT
                name: "Fase"
                singleSelectOptions: [
                  {name: "PHASE_2026", color: GRAY},
                  {name: "PHASE_2027", color: BLUE},
                  {name: "PHASE_2028", color: GREEN},
                  {name: "PHASE_2029", color: YELLOW}
                ]
              }) {
                projectV2Field {
                  ... on ProjectV2SingleSelectField {
                    id
                    name
                  }
                }
              }
            }
          '

          # Create Start field (date)
          gh api graphql -f query='
            mutation {
              createProjectV2Field(input: {
                projectId: "'"$PROJECT_ID"'"
                dataType: DATE
                name: "Start"
              }) {
                projectV2Field {
                  ... on ProjectV2Field {
                    id
                    name
                  }
                }
              }
            }
          '

          # Create End field (date)
          gh api graphql -f query='
            mutation {
              createProjectV2Field(input: {
                projectId: "'"$PROJECT_ID"'"
                dataType: DATE
                name: "End"
              }) {
                projectV2Field {
                  ... on ProjectV2Field {
                    id
                    name
                  }
                }
              }
            }
          '

          # Create Área field (single select)
          gh api graphql -f query='
            mutation {
              createProjectV2Field(input: {
                projectId: "'"$PROJECT_ID"'"
                dataType: SINGLE_SELECT
                name: "Área"
                singleSelectOptions: [
                  {name: "Carreira", color: BLUE},
                  {name: "Idiomas", color: GREEN},
                  {name: "Certificações", color: YELLOW},
                  {name: "Portfólio", color: PURPLE},
                  {name: "Segurança/Qualidade", color: RED}
                ]
              }) {
                projectV2Field {
                  ... on ProjectV2SingleSelectField {
                    id
                    name
                  }
                }
              }
            }
          '

          echo "Roadmap project fields configured successfully"

      - name: Summary
        if: always()
        run: |
          echo "## GitHub Projects Setup Complete! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following projects have been configured:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event.inputs.project_selection }}" = "all" ] || [ "${{ github.event.inputs.project_selection }}" = "master-only" ]; then
            echo "✅ Master — Master (with custom fields: ID, Épico, Fase, Projeto, Status, Start, End, DoD, Obs, Tipo)" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ github.event.inputs.project_selection }}" = "all" ] || [ "${{ github.event.inputs.project_selection }}" = "products-only" ]; then
            echo "✅ Arthemiz — Project" >> $GITHUB_STEP_SUMMARY
            echo "✅ OpsLedger — Project" >> $GITHUB_STEP_SUMMARY
            echo "✅ Vendas3D — Project" >> $GITHUB_STEP_SUMMARY
            echo "✅ SystemHealth — Project" >> $GITHUB_STEP_SUMMARY
            echo "✅ Sentinel Agent — Project" >> $GITHUB_STEP_SUMMARY
            echo "✅ Open Source — Project" >> $GITHUB_STEP_SUMMARY
            echo "   (Each with custom fields: Status, Prioridade, Sprint/Trimestre, Start, End)" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ github.event.inputs.project_selection }}" = "all" ] || [ "${{ github.event.inputs.project_selection }}" = "roadmap-only" ]; then
            echo "✅ Roadmap — Roadmap (with custom fields: Status, Fase, Start, End, Área)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Navigate to your organization's Projects page to view the projects" >> $GITHUB_STEP_SUMMARY
          echo "2. Run the 'Create Issues from Documentation' workflow to populate the projects" >> $GITHUB_STEP_SUMMARY
          echo "3. Note: Views must be created manually in the GitHub UI as the API doesn't support view creation" >> $GITHUB_STEP_SUMMARY
