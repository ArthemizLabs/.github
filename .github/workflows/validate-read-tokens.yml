name: validate-read-tokens

on:
  workflow_call:
    inputs:
      organization:
        description: "Organização a ser consultada."
        required: false
        default: "ArthemizLabs"
        type: string
      project_number:
        description: "Número do Project v2 que será lido."
        required: false
        default: 16
        type: number
    secrets:
      projects_token:
        description: "Token com acesso ao Project v2."
        required: true

permissions:
  contents: read

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - name: Validar se o secret projects_token existe
        shell: bash
        run: |
          if [ -z "${PROJECTS_TOKEN}" ]; then
            echo "Secret projects_token não está configurado neste repositório."
            exit 1
          fi
          echo "Secret projects_token encontrado (valor oculto)."
        env:
          PROJECTS_TOKEN: ${{ secrets.projects_token }}

      - name: Consultar Project v2 da organização
        shell: bash
        run: |
          set -euo pipefail

          query='query($org: String!, $number: Int!) { organization(login: $org) { projectV2(number: $number) { id title } } }'
          variables=$(printf '{"org":"%s","number":%s}' "$ORGANIZATION" "$PROJECT_NUMBER")

          payload=$(jq -n --arg q "$query" --argjson v "$variables" '{query: $q, variables: $v}')

          echo "Executando consulta GraphQL no Project #${PROJECT_NUMBER} da org ${ORGANIZATION}..."

          response_file="$(mktemp)"
          http_code=$(
            curl -sS -o "$response_file" -w "%{http_code}" \
              -H "Authorization: Bearer ${PROJECTS_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d "$payload" \
              https://api.github.com/graphql
          )

          echo "HTTP status: ${http_code}"
          cat "$response_file" | jq

          if [ "${http_code}" -eq 401 ]; then
            echo "Token inválido, expirado ou revogado (401)."
            exit 1
          fi

          if [ "${http_code}" -eq 403 ]; then
            echo "Token válido, porém sem permissão para acessar Projects v2 da org (403)."
            exit 1
          fi

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "Falha inesperada ao chamar GraphQL."
            exit 1
          fi

          errors_count=$(cat "$response_file" | jq '.errors | length // 0')
          if [ "$errors_count" -gt 0 ]; then
            echo "A API retornou erros GraphQL. Verifique permissões e se o Project number existe."
            exit 1
          fi

          echo "Consulta OK. Token consegue ler o Project."
        env:
          PROJECTS_TOKEN: ${{ secrets.projects_token }}
          ORGANIZATION: ${{ inputs.organization }}
          PROJECT_NUMBER: ${{ inputs.project_number }}

      - name: Próximos passos
        run: |
          echo "Se esta validação passou, o token consegue LER o Project #${{ inputs.project_number }}."
          echo "Para validar ESCRITA, o próximo teste é fazer uma mutation updateProjectV2ItemFieldValue (vamos criar depois)."
